name: Lint & Format

on:
  pull_request:
    branches: [main]

jobs:
  # ── C / C++ (embedded STM32 layer) ─────────────────────────────────────────
  lint-c:
    name: C — clang-format + clang-tidy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang-format clang-tidy

      - name: clang-format (format check)
        # Fails if any file would be changed by the formatter.
        # Style is defined in embedded/.clang-format — create that file to
        # override defaults (e.g. BasedOnStyle: Google, IndentWidth: 4).
        run: |
          find embedded/Core -name '*.c' -o -name '*.h' | \
            xargs clang-format --dry-run --Werror --style=file

      - name: clang-tidy (lint)
        # Requires a compile_commands.json produced by CMake with
        # -DCMAKE_EXPORT_COMPILE_COMMANDS=ON in the native test build.
        run: |
          cmake -B embedded/build-lint embedded \
            -DTARGET=native \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          find embedded/Core/Src -name '*.c' | \
            xargs clang-tidy \
              -p embedded/build-lint \
              --warnings-as-errors='*'

  # ── Python (backend / Raspberry Pi layer) ──────────────────────────────────
  lint-python:
    name: Python — Ruff (lint + format)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff — lint
        run: ruff check .

      - name: Ruff — format check
        run: ruff format --check .

  # ── JavaScript / TypeScript (React frontend) ───────────────────────────────
  lint-frontend:
    name: Frontend — ESLint + Prettier
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint . --max-warnings=0

      - name: Prettier (format check)
        run: npx prettier --check .

  # ── Markdown / YAML (repo-level) ───────────────────────────────────────────
  lint-repo:
    name: Repo — Markdownlint + yamllint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"

      - name: yamllint
        run: |
          pip install yamllint
          yamllint .github/workflows .github/ISSUE_TEMPLATE
