name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  # ── Backend (Python / FastAPI / Raspberry Pi layer) ────────────────────────
  backend-tests:
    name: Backend — pytest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --tb=short -q

  # ── Frontend (React + Tailwind) ────────────────────────────────────────────
  frontend-tests:
    name: Frontend — Vitest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run

  # ── Embedded (STM32 — build + unit tests via native GCC) ──────────────────
  embedded-tests:
    name: Embedded — native unit tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: embedded

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc cmake

      - name: Configure (native test build)
        run: cmake -B build-test -DTARGET=native

      - name: Build & run tests
        run: cmake --build build-test --target test
